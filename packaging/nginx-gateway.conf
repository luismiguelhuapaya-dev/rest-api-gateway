# NGINX reverse proxy configuration for Dynamic REST API Gateway
# Copy this file to /etc/nginx/conf.d/rest-api-gateway.conf or
# /etc/nginx/sites-available/ and create a symlink in sites-enabled/

upstream gateway_backend {
    server 127.0.0.1:8080;

    # Uncomment the following to use Unix socket instead of TCP:
    # server unix:/var/run/rest-api-gateway/gateway.sock;

    # Connection keepalive to the gateway
    keepalive 64;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.example.com;

    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.example.com;

    # SSL/TLS certificates
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Logging
    access_log /var/log/nginx/gateway-access.log;
    error_log /var/log/nginx/gateway-error.log;

    # Request size limit (should match gateway max_body_size)
    client_max_body_size 1m;

    # Proxy timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    location / {
        proxy_pass http://gateway_backend;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # Connection keepalive
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Health check endpoint (optional)
    location /health {
        proxy_pass http://gateway_backend/health;
        proxy_set_header Host $host;
        access_log off;
    }
}
